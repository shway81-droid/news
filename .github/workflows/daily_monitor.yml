name: Daily Mokpo Illo Monitor

on:
  # 매일 00:00 UTC = 09:00 KST 실행
  schedule:
    - cron: '0 0 * * *'

  # 수동 실행 가능
  workflow_dispatch:

  # monitor 관련 파일 푸시 시에도 실행 (state.json 자기-루프 방지를 위해 paths 필터)
  push:
    branches: [main]
    paths:
      - 'monitor.py'
      - '.github/workflows/daily_monitor.yml'

permissions:
  contents: write  # state.json 커밋용

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.MUAN_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MUAN_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          if ! git diff --quiet state.json; then
            git config user.name  "monitor-bot"
            git config user.email "monitor-bot@users.noreply.github.com"
            git add state.json
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "state.json unchanged."
          fi
